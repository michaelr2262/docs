<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4d84ff"/>
      <stop offset="100%" stop-color="#1a4fd6"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4d84ff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="rgba(37,99,255,0.28)"/>
      <stop offset="100%" stop-color="rgba(37,99,255,0)"/>
    </radialGradient>
  </defs>

  <rect width="400" height="400" fill="#050507"/>
  <rect width="400" height="400" fill="url(#glow)"/>

  <g transform="translate(110, 60)">
    <polygon points="90,4 172,52 172,140 90,188 8,140 8,52" fill="none" stroke="url(#stroke)" stroke-width="2"/>
    <polygon points="90,26 150,60 150,130 90,164 30,130 30,60" fill="none" stroke="#2563ff" stroke-width="1" opacity="0.4"/>
    <polygon points="90,62 126,82 126,116 90,136 54,116 54,82" fill="url(#shield)"/>
    <circle cx="90" cy="99" r="9" fill="#050507"/>
    <circle cx="90" cy="99" r="5" fill="#00d4ff"/>
  </g>

  <text x="200" y="300" text-anchor="middle" fill="#e4e6f0" font-family="'Rajdhani','Arial Narrow',sans-serif" font-size="52" font-weight="700" letter-spacing="3">
    SENTINEL<tspan fill="#4d84ff">FX</tspan>
  </text>
  <text x="200" y="340" text-anchor="middle" fill="#636880" font-family="'Rajdhani','Arial Narrow',sans-serif" font-size="11" letter-spacing="7">
    THE SHARED SHIELD
  </text>
</svg>
