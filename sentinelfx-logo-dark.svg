<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="600" height="160">
  <defs>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4d84ff"/>
      <stop offset="100%" stop-color="#1a4fd6"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4d84ff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
  </defs>

  <rect width="600" height="160" fill="#050507"/>

  <g transform="translate(22, 22)">
    <polygon points="58,4 112,36 112,92 58,124 4,92 4,36" fill="none" stroke="url(#stroke)" stroke-width="2"/>
    <polygon points="58,18 96,42 96,86 58,110 20,86 20,42" fill="none" stroke="#2563ff" stroke-width="1" opacity="0.45"/>
    <polygon points="58,44 80,56 80,80 58,92 36,80 36,56" fill="url(#shield)"/>
    <circle cx="58" cy="68" r="7" fill="#050507"/>
    <circle cx="58" cy="68" r="4" fill="#00d4ff"/>
  </g>

  <text x="170" y="72" fill="#636880" font-family="'Rajdhani','Arial Narrow',sans-serif" font-size="11" letter-spacing="6">
